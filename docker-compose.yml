# PostgreSQL para o backend Leitura Inteligente (MVP)
# Uso: docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: leitura-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: reading_ai
    ports:
      - "5432:5432"
    volumes:
      - leitura_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: leitura-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - leitura_minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: leitura-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/leitura-inteligente || true
      "

volumes:
  leitura_pg_data:
  leitura_minio_data:
